# Autonomous Task Agent - Configuration
# Swap models by changing llm.model_id only. No code changes required.

llm:
  provider: "ollama"  # Keep this as is, our code adapts
  model_id: "mistral-7b-instruct-v0.2"
  base_url: "http://localhost:1234/v1"  # <--- CRITICAL CHANGE
  temperature: 0.1
  max_tokens: 1000
  timeout_seconds: 120

embeddings:
  provider: "huggingface"
  model_id: "sentence-transformers/all-MiniLM-L6-v2"
  dimension: 384

memory:
  vector_store_path: "data/faiss_index"
  top_k: 5
  similarity_threshold: 0.7
  recency_weight: 0.3  # 0 = ignore recency, 1 = heavy recency bias

evaluation:
  confidence_threshold: 0.6
  max_retries_per_step: 3

tools:
  file:
    allowed_extensions: [".txt", ".md", ".py", ".json", ".csv", ".xlsx", ".pdf"]
    max_size_mb: 10
    root_dir: "."
  code_execution_timeout_seconds: 10
  web_request_timeout_seconds: 15
  web_request_delay_seconds: 1.0  # Rate limiting between requests
  max_web_results: 5

logging:
  dir: "logs"
  level: "INFO"
  format: "jsonl"  # JSON Lines for structured logs

safety:
  refuse_harmful: true
  max_file_size_bytes: 10485760  # 10 MB
  allowed_file_extensions: [".txt", ".md", ".json", ".csv", ".py", ".html"]
