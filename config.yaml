# ─────────────────────────────────────────────────────────────────────────────
# Autonomous Finance Agent — Configuration
# ─────────────────────────────────────────────────────────────────────────────
#
# LM STUDIO (default):
#   provider: lmstudio
#   base_url: http://localhost:1234/v1
#   model_id:  (whatever model you have loaded in LM Studio)
#
# OLLAMA:
#   provider: ollama
#   base_url: http://localhost:11434
#   model_id: mistral   (or llama3, phi3, etc.)
#
# ─────────────────────────────────────────────────────────────────────────────

llm:
  provider: "lmstudio"
  model_id: "mistral-7b-instruct-v0.2"   # Must match what's loaded in LM Studio
  base_url: "http://localhost:1234/v1"
  temperature: 0.1
  max_tokens: 1024
  timeout_seconds: 180                   # Allow longer for slower hardware

embeddings:
  provider: "huggingface"
  model_id: "sentence-transformers/all-MiniLM-L6-v2"
  dimension: 384

memory:
  vector_store_path: "data/faiss_index"
  top_k: 5
  similarity_threshold: 0.7
  recency_weight: 0.3

evaluation:
  confidence_threshold: 0.6
  max_retries_per_step: 3

tools:
  file:
    allowed_extensions: [".txt", ".md", ".py", ".json", ".csv", ".xlsx", ".pdf"]
    max_size_mb: 20
    root_dir: "."
  code_execution_timeout_seconds: 10
  web_request_timeout_seconds: 15
  web_request_delay_seconds: 1.0
  max_web_results: 5

logging:
  dir: "logs"
  level: "INFO"
  format: "jsonl"

safety:
  refuse_harmful: true
  max_file_size_bytes: 20971520           # 20 MB
  allowed_file_extensions: [".txt", ".md", ".json", ".csv", ".py", ".html", ".xlsx", ".pdf"]
